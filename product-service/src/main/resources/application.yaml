spring:
  application:
    name: product-service

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: product-service-group

  datasource:
    url: jdbc:postgresql://localhost:5432/product_service_eda
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
